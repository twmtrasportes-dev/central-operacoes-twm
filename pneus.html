<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0A0A0F">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>TWM — Controle de Pneus</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icone-192.png">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0A0A0F;--bg2:#0F0F18;--bg3:#13131E;--border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.14);--text:#F0EEF8;--muted:#7A7890;--accent:#7B3FE4;--accent2:#A855F7;--accent3:#C084FC;--green:#10B981;--red:#EF4444;--gold:#F59E0B}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;overscroll-behavior:none}

/* HEADER */
.app-header{background:var(--bg2);border-bottom:1px solid var(--border2);padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-left{display:flex;align-items:center;gap:10px}
.btn-back{width:36px;height:36px;background:rgba(255,255,255,.07);border:1px solid var(--border2);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;text-decoration:none;color:var(--text);transition:.15s;flex-shrink:0}
.btn-back:active{background:rgba(255,255,255,.14)}
.header-title{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;letter-spacing:1px;text-transform:uppercase}
.header-badge{background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;padding:3px 10px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;color:white;letter-spacing:1px}

/* SYNC BAR */
.sync-bar{text-align:center;padding:5px;font-size:11px;color:var(--muted);background:var(--bg2);border-bottom:1px solid var(--border);display:none}

/* TABS */
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:56px;z-index:99}
.tab{flex:1;padding:11px 4px;font-size:11px;font-weight:600;text-align:center;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;transition:.2s;letter-spacing:.5px;text-transform:uppercase}
.tab.on{color:var(--accent3);border-bottom-color:var(--accent)}

/* TELAS */
.scr{display:none}.scr.on{display:block}
.pad{padding:14px}

/* BUSCA */
.srch-wrap{position:relative;margin-bottom:12px}
.srch{width:100%;padding:12px 14px 12px 40px;font-size:14px;border:1.5px solid var(--border2);border-radius:12px;background:var(--bg3);color:var(--text);outline:none;transition:.2s;font-family:'Barlow',sans-serif}
.srch:focus{border-color:var(--accent)}
.srch::placeholder{color:var(--muted)}
.srch-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}

/* LISTA */
.list-card{background:var(--bg3);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.vrow{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:.15s;min-height:60px}
.vrow:last-child{border-bottom:none}
.vrow:active{background:rgba(123,63,228,.08)}
.vf{font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:800;color:var(--text);letter-spacing:.5px}
.vi{font-size:11px;color:var(--muted);margin-top:2px}
.varr{color:var(--accent3);font-size:22px;font-weight:300}

/* HISTÓRICO */
.hr-item{padding:13px 16px;border-bottom:1px solid var(--border)}
.hr-item:last-child{border-bottom:none}
.hr-top{font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.hr-fogos{display:flex;gap:8px;align-items:center;margin-bottom:3px;flex-wrap:wrap}
.hr-antigo{font-family:'Barlow Condensed',sans-serif;font-size:16px;color:var(--muted);text-decoration:line-through}
.hr-novo{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;color:var(--accent3)}
.hr-sulco{font-size:11px;background:rgba(16,185,129,.15);color:var(--green);border-radius:6px;padding:2px 7px;font-weight:600}
.hr-meta{font-size:11px;color:var(--muted)}
.empty{padding:40px 16px;text-align:center;color:var(--muted);font-size:13px}

/* DETALHE */
.svg-wrap{padding:16px 16px 8px;text-align:center;background:var(--bg2);border-bottom:1px solid var(--border)}
.veiculo-info{padding:12px 16px 8px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.tire-list{padding:6px 14px 60px}
.grp-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin:16px 0 8px 2px}

/* PNEUS NA LISTA — MAIORES */
.ti{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--bg3);border:1.5px solid var(--border);border-radius:14px;margin-bottom:8px;cursor:pointer;transition:.15s;min-height:70px}
.ti:active,.ti.sel{border-color:var(--accent);background:rgba(123,63,228,.08)}
.tn{font-size:14px;color:var(--text);font-weight:600}
.tc{font-size:11px;color:var(--muted);font-family:monospace;margin-top:3px}
.tf{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:800;color:var(--accent3)}
.tf.vz{color:var(--muted);font-size:16px;font-weight:400}
.ts{font-size:11px;color:var(--accent);margin-left:10px;font-weight:700;white-space:nowrap}
.sulco-badge{font-size:10px;background:rgba(16,185,129,.12);color:var(--green);border-radius:5px;padding:2px 6px;margin-top:4px;display:inline-block;font-weight:600}
.sulco-badge.warn{background:rgba(249,115,22,.15);color:var(--gold)}
.sulco-badge.danger{background:rgba(239,68,68,.15);color:var(--red)}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.8);align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal-box{background:var(--bg3);border:1px solid var(--border2);border-radius:24px 24px 0 0;padding:20px 20px 44px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
.modal-handle{width:44px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 18px}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;color:var(--text);margin-bottom:16px;text-transform:uppercase}
.mfg{margin-bottom:13px}
.mfg label{display:block;font-size:10px;font-weight:700;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.mfv{background:var(--bg2);border-radius:10px;padding:10px 14px;font-size:13px;color:var(--muted)}
.mfv.fogo{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:800;color:var(--accent3)}
.modal-input{width:100%;padding:14px 16px;border:1.5px solid var(--border2);border-radius:12px;font-size:22px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:2px;color:var(--text);background:var(--bg2);outline:none;transition:.2s;text-transform:uppercase}
.modal-input:focus{border-color:var(--accent)}
.modal-input::placeholder{color:var(--muted);font-size:15px;font-family:'Barlow',sans-serif;font-weight:400;letter-spacing:0}
.modal-input2{width:100%;padding:14px 16px;border:1.5px solid var(--border2);border-radius:12px;font-size:15px;font-family:'Barlow',sans-serif;color:var(--text);background:var(--bg2);outline:none;transition:.2s}
.modal-input2:focus{border-color:var(--accent)}
.modal-input2::placeholder{color:var(--muted)}
/* Input de sulco com unidade */
.sulco-wrap{position:relative}
.sulco-wrap .modal-input2{padding-right:40px}
.sulco-unit{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--muted);font-weight:600;pointer-events:none}
.modal-btns{display:flex;gap:10px;margin-top:20px}
.btn-cancel{padding:14px 18px;border:1.5px solid var(--border2);border-radius:12px;background:transparent;font-size:14px;color:var(--muted);cursor:pointer;font-family:'Barlow',sans-serif;transition:.15s}
.btn-cancel:active{background:var(--bg2)}
.btn-confirm{flex:1;padding:14px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:12px;color:white;font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:.15s}
.btn-confirm:active{opacity:.8}

/* TOAST */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:12px 22px;border-radius:24px;font-size:13px;font-weight:600;z-index:300;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.toast.show{opacity:1}

/* ── TEMA CLARO ─────────────────────────────────────────────── */
body.light{--bg:#F4F3FF;--bg2:#FFFFFF;--bg3:#FAFAFA;--border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.13);--text:#1A1A2E;--muted:#6B6880}
body.light .app-header{box-shadow:0 1px 8px rgba(0,0,0,.08)}
body.light .list-card{box-shadow:0 1px 6px rgba(0,0,0,.06)}
body.light .modal-box{box-shadow:0 -4px 32px rgba(0,0,0,.12)}
body.light .pneu-card{box-shadow:0 1px 6px rgba(0,0,0,.06)}
</style>
</head>
<body>
<script>
// ── TEMA CLARO/ESCURO ─────────────────────────────────────────
(function() {
  if (localStorage.getItem('twm_tema') === 'claro') {
    document.addEventListener('DOMContentLoaded', function() {
      document.body.classList.add('light');
    });
    if (document.readyState !== 'loading') document.body.classList.add('light');
  }
})();
</script>

<div class="app-header">
  <div class="header-left">
    <div class="btn-back" onclick="voltarPneus()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="17" height="17"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    </div>
    <div class="header-title">Pneus</div>
  </div>
  <div class="header-badge">FROTA</div>
</div>

<div class="sync-bar" id="syncBar"></div>

<div class="tabs">
  <div class="tab on" onclick="showTab('c')">Cavalos</div>
  <div class="tab"    onclick="showTab('r')">Carretas</div>
  <div class="tab"    onclick="showTab('h')">Histórico</div>
</div>

<div id="s-c" class="scr on pad">
  <div class="srch-wrap">
    <svg class="srch-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input class="srch" placeholder="Buscar frota..." oninput="filtrar(this.value,'c')">
  </div>
  <div class="list-card" id="lC"></div>
</div>

<div id="s-r" class="scr pad">
  <div class="srch-wrap">
    <svg class="srch-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input class="srch" placeholder="Buscar frota..." oninput="filtrar(this.value,'r')">
  </div>
  <div class="list-card" id="lR"></div>
</div>

<div id="s-h" class="scr pad">
  <div class="list-card" id="lH"><div class="empty">Nenhuma troca registrada ainda.</div></div>
</div>

<div id="s-d" class="scr">
  <div class="svg-wrap" id="svgW"></div>
  <div class="veiculo-info" id="veicInfo"></div>
  <div class="tire-list" id="tlW"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-title">🔧 Registrar Troca</div>
    <div class="mfg"><label>Veículo</label><div class="mfv" id="mV">—</div></div>
    <div class="mfg"><label>Posição</label><div class="mfv" id="mP">—</div></div>
    <div class="mfg"><label>Nº fogo atual (saindo)</label><div class="mfv fogo" id="mO">—</div></div>
    <div class="mfg">
      <label>Nº fogo novo (entrando)</label>
      <input class="modal-input" id="mN" placeholder="Ex: 14500" inputmode="numeric">
    </div>
    <div class="mfg">
      <label>Profundidade do sulco (mm)</label>
      <div class="sulco-wrap">
        <input class="modal-input2" id="mS" placeholder="Ex: 8.5" inputmode="decimal" type="number" min="0" max="25" step="0.5">
        <span class="sulco-unit">mm</span>
      </div>
    </div>
    <div class="mfg">
      <label>Borracheiro</label>
      <input class="modal-input2" id="mW" placeholder="Nome do borracheiro">
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-confirm" onclick="salvarTroca()">✓ Confirmar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

let tires = {}, historico = [], fogos = {};
let curV = null, curP = null, curTab = 'c';

// ── INIT ──────────────────────────────────────────────────────
function init() {
  fogos     = lerLocal('twm_pneus_fogos') || {};
  historico = lerLocal('twm_pneus_hist')  || [];

  // Carrega cache local primeiro — app funciona imediatamente
  const cacheCAV = lerLocal('twm_frota_cav');
  const cacheCAR = lerLocal('twm_frota_car');
  if (cacheCAV && cacheCAV.length) {
    CAV = cacheCAV;
    CAR = cacheCAR || [];
    renderLista(CAV, 'lC', '');
    renderLista(CAR, 'lR', '');
    setSyncBar('⏳ Atualizando frota...');
  } else {
    document.getElementById('lC').innerHTML = '<div class="empty">⏳ Carregando frota da planilha...</div>';
    document.getElementById('lR').innerHTML = '<div class="empty">⏳ Carregando frota da planilha...</div>';
  }
  // Busca planilha em background
  setTimeout(carregarFrota, 500);
}

// ── CARREGAR FROTA DA PLANILHA ────────────────────────────────
function carregarFrota() {
  // Cavalos primeiro — aparece imediatamente no mobile
  fetch(SCRIPT_URL + '?action=getCavalos')
    .then(r => r.json())
    .then(d => {
      if (d.ok && d.cavalos && d.cavalos.length) {
        CAV = d.cavalos.map(function(v) {
          return {
            f: v.f, tipo: 'cavalo',
            has_di2: v.has_di2 || Object.keys(v.t||{}).some(function(k){ return k==='DI2-E'||k==='DI2-D'; }),
            has_tr2: v.has_tr2 || Object.keys(v.t||{}).some(function(k){ return k.indexOf('TR2')===0; }),
            t: v.t || {}, d: v.d || {}
          };
        });
        salvarLocal('twm_frota_cav', CAV);
        tires = {};
        renderLista(CAV, 'lC', '');
        setSyncBar('✅ Cavalos sincronizados', 1500);
        if (curV && (curV.tipo === 'cavalo' || 'has_di2' in curV)) renderDetalhe();
      }
    })
    .catch(() => {});

  // Carretas em paralelo
  fetch(SCRIPT_URL + '?action=getCarretas')
    .then(r => r.json())
    .then(d => {
      if (d.ok && d.carretas && d.carretas.length) {
        CAR = d.carretas.map(function(v) {
          var maxN = 1;
          Object.keys(v.t||{}).forEach(function(k) {
            var m = k.match(/^E(\d+)-/);
            if (m && parseInt(m[1]) > maxN) maxN = parseInt(m[1]);
          });
          return { f: v.f, tipo: 'carreta', n: v.n || maxN, t: v.t || {}, d: v.d || {} };
        });
        salvarLocal('twm_frota_car', CAR);
        renderLista(CAR, 'lR', '');
        if (curV && curV.tipo === 'carreta') renderDetalhe();
      }
    })
    .catch(() => {});

  // Histórico em paralelo
  fetch(SCRIPT_URL + '?action=getHistoricoPneus')
    .then(r => r.json())
    .then(d => {
      if (d.ok && d.historico && d.historico.length) {
        historico = d.historico;
        salvarLocal('twm_pneus_hist', historico);
        if (curTab === 'h') renderHist();
      }
    })
    .catch(() => {});
}

function usarBackup() {
  if (CAV.length) return; // já tem dados do cache, não sobrescreve
  // Sem cache e sem servidor — mostra mensagem de erro
  document.getElementById('lC').innerHTML = '<div class="empty">⚠ Sem conexão com a planilha.<br>Verifique a internet e recarregue.</div>';
  document.getElementById('lR').innerHTML = '<div class="empty">⚠ Sem conexão com a planilha.<br>Verifique a internet e recarregue.</div>';
}

function getTires(f) {
  if (!tires[f]) {
    const all = [...CAV,...CAR];
    const v = all.find(x => x.f === f);
    tires[f] = v ? {...v.t} : {};
    if (fogos[f]) Object.assign(tires[f], fogos[f]);
  }
  return tires[f];
}

function getDatas(f) {
  try {
    const all = [...CAV,...CAR];
    const v = all.find(x => x.f === f);
    const datasPlani = (v && v.d) ? v.d : {};
    const datasLocal = lerLocal('twm_datas_' + f) || {};
    const merged = {...datasPlani, ...datasLocal};
    // Formata todas as datas para dd/mm/aaaa
    Object.keys(merged).forEach(k => {
      const d = merged[k];
      if (!d) { merged[k] = ''; return; }
      // Já está no formato dd/mm/aaaa
      if (/^\d{2}\/\d{2}\/\d{4}/.test(String(d))) return;
      // Tenta converter qualquer formato para dd/mm/aaaa
      try {
        const dt = new Date(d);
        if (!isNaN(dt.getTime())) {
          merged[k] = dt.toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit', year:'numeric'});
        }
      } catch(e) { merged[k] = String(d); }
    });
    return merged;
  } catch(e) { return {}; }
}

// sincronizar() substituída por carregarFrota()

function setSyncBar(msg, hideAfter) {
  const el = document.getElementById('syncBar');
  el.textContent = msg; el.style.display = 'block';
  if (hideAfter) setTimeout(() => { el.style.display = 'none'; }, hideAfter);
}

// ── TABS ──────────────────────────────────────────────────────
function showTab(t) {
  curTab = t;
  document.querySelectorAll('.scr').forEach(s => s.classList.remove('on'));
  document.querySelectorAll('.tab').forEach((x,i) => x.classList.toggle('on', ['c','r','h'][i] === t));
  document.getElementById('s-'+t).classList.add('on');
  document.getElementById('s-d').classList.remove('on');
  history.replaceState({tela: 'lista'}, '');
  if (t === 'h') renderHist();
}

// ── LISTA ─────────────────────────────────────────────────────
function renderLista(items, elId, filtro) {
  const f = filtro.toLowerCase();
  const fil = f ? items.filter(v => v.f.toLowerCase().includes(f)) : items;
  const el = document.getElementById(elId);
  if (!fil.length) { el.innerHTML = '<div class="empty">Nenhum resultado.</div>'; return; }
  el.innerHTML = fil.map(v => {
    const isCav = v.tipo === 'cavalo' || 'has_di2' in v;
    const sub = isCav
      ? (v.has_di2 ? '2 dianteiros' : '1 dianteiro') + ' · ' + (v.has_tr2 ? '2 trações' : '1 tração')
      : v.n + ' eixos';
    return `<div class="vrow" onclick="abrirVeiculo('${v.f}')">
      <div>
        <div class="vf">${v.f}</div>
        <div class="vi">${sub}</div>
      </div>
      <span class="varr">›</span>
    </div>`;
  }).join('');
}

function filtrar(val, tipo) {
  if (tipo === 'c') renderLista(CAV, 'lC', val);
  else renderLista(CAR, 'lR', val);
}

// ── HISTÓRICO ─────────────────────────────────────────────────
function sulcoCor(s) {
  if (!s || s === '') return '';
  const n = parseFloat(s);
  if (n >= 6) return 'sulco-badge';
  if (n >= 3) return 'sulco-badge warn';
  return 'sulco-badge danger';
}

function renderHist() {
  const el = document.getElementById('lH');
  if (!historico.length) { el.innerHTML = '<div class="empty">Nenhuma troca registrada ainda.</div>'; return; }
  el.innerHTML = historico.slice(0, 200).map(h => {
    const sulco = h.sulco || h.profundidade_sulco || '';
    const sulcoHtml = sulco ? `<span class="${sulcoCor(sulco)}">🔵 ${sulco}mm</span>` : '';
    return `<div class="hr-item">
      <div class="hr-top">${h.veiculo||h.f||''} · ${h.posicao_nome||h.pn||''}</div>
      <div class="hr-fogos">
        <span class="hr-antigo">${h.fogo_antigo||h.o||'—'}</span>
        <span style="color:var(--muted)">→</span>
        <span class="hr-novo">${h.fogo_novo||h.n||''}</span>
        ${sulcoHtml}
      </div>
      <div class="hr-meta">${h.data||h.d||''} · ${h.borracheiro||h.w||''}</div>
    </div>`;
  }).join('');
}

// ── ABRIR VEÍCULO ─────────────────────────────────────────────
function abrirVeiculo(frota) {
  const all = [...CAV,...CAR];
  curV = all.find(v => v.f === frota);
  history.pushState({tela: 'detalhe', frota}, '');
  document.querySelectorAll('.scr').forEach(s => s.classList.remove('on'));
  document.getElementById('s-d').classList.add('on');
  closeModal();
  renderDetalhe();
  window.scrollTo({top:0,behavior:'smooth'});
}

// ── POSIÇÕES ──────────────────────────────────────────────────
function buildCavPos(v) {
  const p = [];
  p.push({id:'DI-E', name:'Dianteiro Esquerdo',       grp:'Dianteiro 1'});
  p.push({id:'DI-D', name:'Dianteiro Direito',         grp:'Dianteiro 1'});
  if (v.has_di2) {
    p.push({id:'DI2-E', name:'2° Dianteiro Esquerdo', grp:'Dianteiro 2'});
    p.push({id:'DI2-D', name:'2° Dianteiro Direito',  grp:'Dianteiro 2'});
  }
  p.push({id:'TR-EE', name:'Tração Esq. Externo',      grp:'Tração 1'});
  p.push({id:'TR-EI', name:'Tração Esq. Interno',      grp:'Tração 1'});
  p.push({id:'TR-DI', name:'Tração Dir. Interno',      grp:'Tração 1'});
  p.push({id:'TR-DE', name:'Tração Dir. Externo',      grp:'Tração 1'});
  if (v.has_tr2) {
    p.push({id:'TR2-EE', name:'2a Tração Esq. Externo', grp:'Tração 2'});
    p.push({id:'TR2-EI', name:'2a Tração Esq. Interno', grp:'Tração 2'});
    p.push({id:'TR2-DI', name:'2a Tração Dir. Interno', grp:'Tração 2'});
    p.push({id:'TR2-DE', name:'2a Tração Dir. Externo', grp:'Tração 2'});
  }
  return p;
}

function buildCarPos(v) {
  const p = [];
  if (v.t['EST-E']) p.push({id:'EST-E', name:'Estepe Esquerdo', grp:'Estepes'});
  if (v.t['EST-D']) p.push({id:'EST-D', name:'Estepe Direito',  grp:'Estepes'});
  for (let e = 1; e <= v.n; e++) {
    p.push({id:`E${e}-EE`, name:`${e}° Eixo Esq. Externo`, grp:`${e}° Eixo`});
    p.push({id:`E${e}-EI`, name:`${e}° Eixo Esq. Interno`, grp:`${e}° Eixo`});
    p.push({id:`E${e}-DI`, name:`${e}° Eixo Dir. Interno`,  grp:`${e}° Eixo`});
    p.push({id:`E${e}-DE`, name:`${e}° Eixo Dir. Externo`,  grp:`${e}° Eixo`});
  }
  return p;
}

function getPosicoes() {
  const isCav = curV.tipo === 'cavalo' || 'has_di2' in curV;
  return isCav ? buildCavPos(curV) : buildCarPos(curV);
}

// ── RENDERIZAR DETALHE ────────────────────────────────────────
function renderDetalhe() {
  const v = curV;
  const isCav = v.tipo === 'cavalo' || 'has_di2' in v;
  const trs = getTires(v.f);
  const datas = getDatas(v.f);
  const pos = isCav ? buildCavPos(v) : buildCarPos(v);

  // Info do veículo
  document.getElementById('veicInfo').innerHTML = `
    <div>
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;color:var(--text)">${v.f}</div>
      <div style="font-size:11px;color:var(--muted)">${isCav ? 'CAVALO' : 'CARRETA'}</div>
    </div>
    <button onclick="voltarPneus()" style="padding:9px 14px;border:1.5px solid var(--border2);border-radius:10px;background:transparent;color:var(--muted);font-size:13px;cursor:pointer;font-family:'Barlow',sans-serif">← Voltar</button>`;

  // SVG do caminhão/carreta
  renderSVG(v, isCav, trs);

  // Lista de pneus
  const grps = {};
  pos.forEach(p => { if (!grps[p.grp]) grps[p.grp] = []; grps[p.grp].push(p); });
  let html = '';
  for (const g in grps) {
    html += `<div class="grp-label">${g}</div>`;
    grps[g].forEach(p => {
      const fire = trs[p.id] || '';
      const sel = curP === p.id;
      // Tenta pegar sulco salvo localmente
      const sulcoKey = v.f + '_' + p.id + '_sulco';
      const sulcoVal = lerLocal(sulcoKey) || '';
      const sulcoHtml = sulcoVal ? `<div class="${sulcoCor(sulcoVal)}">🔵 ${sulcoVal}mm</div>` : '';
      const dataMont = datas[p.id] || '';
      const dataHtml = dataMont ? `<div style="font-size:10px;color:var(--muted);margin-top:2px">📅 Montado em ${dataMont}</div>` : '';
      html += `<div class="ti${sel?' sel':''}" onclick="selP('${p.id}')">
        <div>
          <div class="tn">${p.name}</div>
          <div class="tc">${p.id}</div>
          ${sulcoHtml}
          ${dataHtml}
        </div>
        <div style="display:flex;align-items:center">
          <span class="tf${!fire?' vz':''}">${fire||'—'}</span>
          <span class="ts">Trocar →</span>
        </div>
      </div>`;
    });
  }
  document.getElementById('tlW').innerHTML = html;
}

// ── SVG REDESENHADO ───────────────────────────────────────────
function renderSVG(v, isCav, trs) {
  // Pneus maiores e mais bonitos
  const TW = 28, TH = 44;
  let svgT = [];

  if (isCav) {
    let y = 100;
    svgT.push({id:'DI-E',x:28,y},{id:'DI-D',x:312,y}); y += 66;
    if (v.has_di2) { svgT.push({id:'DI2-E',x:28,y},{id:'DI2-D',x:312,y}); y += 66; }
    svgT.push({id:'TR-EE',x:18,y},{id:'TR-EI',x:48,y},{id:'TR-DI',x:292,y},{id:'TR-DE',x:322,y}); y += 64;
    if (v.has_tr2) { svgT.push({id:'TR2-EE',x:18,y},{id:'TR2-EI',x:48,y},{id:'TR2-DI',x:292,y},{id:'TR2-DE',x:322,y}); }
  } else {
    let y = 80;
    if (v.t['EST-E']) svgT.push({id:'EST-E',x:28,y});
    if (v.t['EST-D']) svgT.push({id:'EST-D',x:312,y});
    y += 60;
    for (let e = 1; e <= v.n; e++) {
      svgT.push({id:`E${e}-EE`,x:18,y},{id:`E${e}-EI`,x:48,y},{id:`E${e}-DI`,x:292,y},{id:`E${e}-DE`,x:322,y});
      y += 62;
    }
  }

  const totalH = Math.max(...svgT.map(t => t.y)) + 60;
  const W = 340;

  let s = `<svg viewBox="0 0 ${W} ${totalH}" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:320px">`;

  // Fundo da cabine/carroceria
  s += `<defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E1B2E"/>
      <stop offset="100%" stop-color="#13111F"/>
    </linearGradient>
    <linearGradient id="tireGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A2A35"/>
      <stop offset="100%" stop-color="#1A1A22"/>
    </linearGradient>
    <linearGradient id="tireSelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3D1F8A"/>
      <stop offset="100%" stop-color="#2A1266"/>
    </linearGradient>
  </defs>`;

  // Labels
  s += `<text x="170" y="16" text-anchor="middle" font-size="10" fill="#4A4860" letter-spacing="2" font-family="Barlow,sans-serif">← FRENTE</text>`;
  s += `<text x="9" y="${totalH/2}" text-anchor="middle" font-size="9" fill="#4A4860" transform="rotate(-90,9,${totalH/2})" font-family="Barlow,sans-serif">ESQ</text>`;
  s += `<text x="${W-9}" y="${totalH/2}" text-anchor="middle" font-size="9" fill="#4A4860" transform="rotate(90,${W-9},${totalH/2})" font-family="Barlow,sans-serif">DIR</text>`;

  // Corpo do veículo
  if (isCav) {
    // Cabine do caminhão
    s += `<rect x="72" y="22" width="196" height="60" rx="8" fill="url(#bodyGrad)" stroke="#3B3655" stroke-width="1"/>`;
    // Janela
    s += `<rect x="88" y="32" width="164" height="36" rx="5" fill="#0D1B2A" stroke="#1E3A5F" stroke-width="0.8"/>`;
    s += `<line x1="170" y1="32" x2="170" y2="68" stroke="#1E3A5F" stroke-width="0.8"/>`;
    // Chassi
    s += `<rect x="72" y="82" width="196" height="${totalH-100}" rx="4" fill="url(#bodyGrad)" stroke="#3B3655" stroke-width="1"/>`;
    // Eixos
    svgT.filter(t => t.id.startsWith('TR')).forEach(t => {
      s += `<line x1="72" y1="${t.y}" x2="${W-72}" y2="${t.y}" stroke="#2A2535" stroke-width="2"/>`;
    });
    if (v.has_di2) {
      const diT = svgT.find(t => t.id === 'DI2-E');
      if (diT) s += `<line x1="72" y1="${diT.y}" x2="${W-72}" y2="${diT.y}" stroke="#2A2535" stroke-width="2"/>`;
    }
    const di1 = svgT.find(t => t.id === 'DI-E');
    if (di1) s += `<line x1="72" y1="${di1.y}" x2="${W-72}" y2="${di1.y}" stroke="#2A2535" stroke-width="2"/>`;
  } else {
    // Corpo da carreta
    const startY = v.t['EST-E'] || v.t['EST-D'] ? 140 : 60;
    s += `<rect x="72" y="${startY-30}" width="196" height="${totalH - startY}" rx="4" fill="url(#bodyGrad)" stroke="#3B3655" stroke-width="1"/>`;
    // Eixos
    for (let e = 1; e <= v.n; e++) {
      const eixoT = svgT.find(t => t.id === `E${e}-EE`);
      if (eixoT) s += `<line x1="72" y1="${eixoT.y}" x2="${W-72}" y2="${eixoT.y}" stroke="#2A2535" stroke-width="2.5"/>`;
    }
  }

  // Identificação
  s += `<text x="170" y="${isCav?66:totalH/2+4}" text-anchor="middle" font-size="${isCav?10:14}" fill="#8A86A8" font-family="Barlow Condensed,sans-serif" font-weight="700" letter-spacing="1">${v.f}</text>`;

  // Pneus
  svgT.forEach(st => {
    const fire = trs[st.id] || '';
    const sel = curP === st.id;
    const cx = st.x, cy = st.y;
    const rx = TW/2, ry = TH/2;

    // Pneu (elipse para parecer mais real)
    s += `<g style="cursor:pointer" onclick="selP('${st.id}')">`;
    // Sombra
    s += `<ellipse cx="${cx}" cy="${cy+2}" rx="${rx}" ry="${ry}" fill="rgba(0,0,0,.4)"/>`;
    // Borracha externa
    s += `<ellipse cx="${cx}" cy="${cy}" rx="${rx}" ry="${ry}" fill="${sel?'#5B2DC4':'#1C1C28'}" stroke="${sel?'#9D6EFF':'#4A4860'}" stroke-width="${sel?2:1.2}"/>`;
    // Aro interno
    s += `<ellipse cx="${cx}" cy="${cy}" rx="${rx-6}" ry="${ry-8}" fill="${sel?'#2D1870':'#0E0E18'}" stroke="${sel?'#7B3FE4':'#2A2838'}" stroke-width="${sel?1.5:0.8}"/>`;
    // Parafusos decorativos
    const bolts = sel ? [[cx,cy-ry+12],[cx,cy+ry-12],[cx-rx+8,cy],[cx+rx-8,cy]] : [];
    bolts.forEach(([bx,by]) => {
      s += `<circle cx="${bx}" cy="${by}" r="1.5" fill="#9D6EFF" opacity="0.6"/>`;
    });
    // Texto do ID
    s += `<text x="${cx}" y="${cy-5}" text-anchor="middle" font-size="5.5" fill="${sel?'#D4B5FF':'#8A86A8'}" font-weight="700" font-family="Barlow Condensed,sans-serif">${st.id}</text>`;
    // Número de fogo
    s += `<text x="${cx}" y="${cy+8}" text-anchor="middle" font-size="${fire.length>5?4.5:5.5}" fill="${fire?(sel?'#E4C5FF':'#A855F7'):'#3A3848'}" font-weight="600" font-family="Barlow Condensed,sans-serif">${fire||'—'}</text>`;
    s += `</g>`;
  });

  s += `</svg>`;
  document.getElementById('svgW').innerHTML = s;
}

// ── MODAL ─────────────────────────────────────────────────────
function selP(id) {
  curP = id;
  const pos = getPosicoes().find(p => p.id === id);
  if (!pos) return;
  const trs = getTires(curV.f);
  document.getElementById('mV').textContent = curV.f;
  document.getElementById('mP').textContent = pos.name + ' (' + id + ')';
  document.getElementById('mO').textContent = trs[id] || '(sem registro)';
  document.getElementById('mN').value = '';
  document.getElementById('mS').value = '';
  document.getElementById('mW').value = '';
  document.getElementById('modalOverlay').classList.add('open');
  history.pushState({tela: 'modal'}, '');
  setTimeout(() => document.getElementById('mN').focus(), 300);
  renderDetalhe();
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  curP = null;
}

document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ── SALVAR TROCA ──────────────────────────────────────────────
function salvarTroca() {
  const nf    = document.getElementById('mN').value.trim().toUpperCase();
  const sulco = document.getElementById('mS').value.trim();
  const who   = document.getElementById('mW').value.trim();

  if (!nf)  { showToast('⚠ Informe o número de fogo novo'); return; }
  if (!who) { showToast('⚠ Informe o nome do borracheiro'); return; }

  const pos       = getPosicoes().find(p => p.id === curP);
  const trs       = getTires(curV.f);
  const fogoAntigo = trs[curP] || '';
  const isCav     = curV.tipo === 'cavalo' || 'has_di2' in curV;
  const agora     = new Date();
  const data      = agora.toLocaleString('pt-BR', {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
  const aba       = isCav ? 'CAVALOS' : 'CARRETAS';

  const registro = {
    action:         'salvarTroca',
    aba,
    veiculo:        curV.f,
    posicao_id:     curP,
    posicao_nome:   pos.name,
    fogo_antigo:    fogoAntigo,
    fogo_novo:      nf,
    sulco:          sulco,
    borracheiro:    who,
    data
  };

  // Atualiza local
  tires[curV.f][curP] = nf;
  if (!fogos[curV.f]) fogos[curV.f] = {};
  fogos[curV.f][curP] = nf;
  // Salva data de montagem local
  const datasLocal = lerLocal('twm_datas_'+curV.f) || {};
  datasLocal[curP] = registro.data.split(' ')[0]; // dd/mm/aaaa
  salvarLocal('twm_datas_'+curV.f, datasLocal);
  historico.unshift({...registro});

  // Salva sulco por posição
  if (sulco) salvarLocal(curV.f + '_' + curP + '_sulco', sulco);

  salvarLocal('twm_pneus_fogos', fogos);
  salvarLocal('twm_pneus_hist', historico.slice(0, 500));

  // Envia ao servidor via GET (sem CORS)
  if (navigator.onLine) {
    const params = new URLSearchParams({
      action:       'salvarTroca',
      aba:          registro.aba,
      veiculo:      registro.veiculo,
      posicao_id:   registro.posicao_id,
      posicao_nome: registro.posicao_nome,
      fogo_antigo:  registro.fogo_antigo,
      fogo_novo:    registro.fogo_novo,
      sulco:        registro.sulco || '',
      borracheiro:  registro.borracheiro,
      data:         registro.data,
      data_montagem: registro.data.split(' ')[0]
    });
    fetch(SCRIPT_URL + '?' + params.toString())
      .then(r => r.json())
      .then(d => { if (!d.ok) console.warn('Erro ao salvar:', d.msg); })
      .catch(() => {});
  }

  closeModal();
  renderDetalhe();
  showToast('✅ Troca registrada!');
}

// ── LOCAL STORAGE ─────────────────────────────────────────────
function salvarLocal(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {} }
function lerLocal(k) { try { return JSON.parse(localStorage.getItem(k)); } catch(e) { return null; } }

// ── TOAST ─────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── NAVEGAÇÃO ─────────────────────────────────────────────────
function voltarPneus() {
  const modalAberto = document.getElementById('modalOverlay').classList.contains('open');
  if (modalAberto) {
    closeModal();
    return;
  }
  const detalheAtivo = document.getElementById('s-d').classList.contains('on');
  if (detalheAtivo) {
    showTab(curTab);
    return;
  }
  window.location.href = 'index.html';
}

window.addEventListener('popstate', function(e) {
  // Verifica estado ATUAL da tela (não do history)
  const modalAberto = document.getElementById('modalOverlay').classList.contains('open');
  const detalheAtivo = document.getElementById('s-d').classList.contains('on');

  if (modalAberto) {
    // Modal aberto → fecha modal e restaura estado de detalhe
    closeModal();
    history.pushState({tela: 'detalhe'}, '');
    return;
  }

  if (detalheAtivo) {
    // No detalhe → volta para lista
    showTab(curTab);
    return;
  }

  // Na lista → vai para index
  window.location.href = 'index.html';
});

// Estado inicial
history.replaceState({tela: 'lista'}, '');
</script>
