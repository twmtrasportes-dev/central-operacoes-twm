<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0A0A0F">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>TWM — Estoque de Pneus</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icone-192.png">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0A0A0F;--bg2:#0F0F18;--bg3:#13131E;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.14);
  --text:#F0EEF8;--muted:#7A7890;
  --accent:#7B3FE4;--accent2:#A855F7;--accent3:#C084FC;
  --green:#10B981;--red:#EF4444;--orange:#F97316;--gold:#F59E0B;--blue:#3B82F6;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;overscroll-behavior:none}

/* HEADER */
.app-header{background:var(--bg2);border-bottom:1px solid var(--border2);padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-left{display:flex;align-items:center;gap:10px}
.btn-back{width:36px;height:36px;background:rgba(255,255,255,.07);border:1px solid var(--border2);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;text-decoration:none;color:var(--text)}
.header-title{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;letter-spacing:1px;text-transform:uppercase}
.header-badge{background:linear-gradient(135deg,var(--green),#059669);border-radius:8px;padding:3px 10px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;color:white;letter-spacing:1px}

/* SYNC */
.sync-bar{text-align:center;padding:5px;font-size:11px;color:var(--muted);background:var(--bg2);border-bottom:1px solid var(--border);display:none}

/* TABS */
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:56px;z-index:99;overflow-x:auto}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;min-width:80px;padding:11px 6px;font-size:10px;font-weight:700;text-align:center;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;transition:.2s;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap}
.tab.on{color:var(--accent3);border-bottom-color:var(--accent)}

/* TELAS */
.scr{display:none}.scr.on{display:block}
.pad{padding:14px}

/* BOTÃO ADICIONAR */
.fab{position:fixed;bottom:24px;right:20px;z-index:90;background:linear-gradient(135deg,var(--green),#059669);border:none;border-radius:50px;padding:14px 22px;color:white;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;letter-spacing:1px;cursor:pointer;box-shadow:0 4px 20px rgba(16,185,129,.4);display:flex;align-items:center;gap:8px}
.fab:active{opacity:.85;transform:scale(.97)}

/* BUSCA */
.srch-wrap{position:relative;margin-bottom:12px}
.srch{width:100%;padding:12px 14px 12px 40px;font-size:14px;border:1.5px solid var(--border2);border-radius:12px;background:var(--bg3);color:var(--text);outline:none;transition:.2s;font-family:'Barlow',sans-serif}
.srch:focus{border-color:var(--accent)}
.srch::placeholder{color:var(--muted)}
.srch-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}

/* CARDS DE PNEU */
.pneu-card{background:var(--bg3);border:1.5px solid var(--border);border-radius:16px;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:.15s;position:relative}
.pneu-card:active{background:var(--bg2)}
.pneu-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.pneu-fogo{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;color:var(--text);letter-spacing:1px}
.status-badge{border-radius:8px;padding:4px 10px;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap}
.s-disponivel{background:rgba(16,185,129,.15);color:var(--green);border:1px solid rgba(16,185,129,.3)}
.s-em_uso{background:rgba(123,63,228,.15);color:var(--accent3);border:1px solid rgba(123,63,228,.3)}
.s-aguardando{background:rgba(245,158,11,.15);color:var(--gold);border:1px solid rgba(245,158,11,.3)}
.s-reformadora{background:rgba(59,130,246,.15);color:var(--blue);border:1px solid rgba(59,130,246,.3)}
.s-recuperacao{background:rgba(249,115,22,.15);color:var(--orange);border:1px solid rgba(249,115,22,.3)}
.s-venda{background:rgba(168,85,247,.15);color:var(--accent2);border:1px solid rgba(168,85,247,.3)}
.s-vendido{background:rgba(100,116,139,.15);color:#94A3B8;border:1px solid rgba(100,116,139,.3)}
.s-descarte{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3)}
.pneu-info{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:6px}
.pneu-info-item{font-size:12px;color:var(--muted)}
.pneu-info-item span{color:var(--text);font-weight:600}
.pneu-frota{display:inline-flex;align-items:center;gap:5px;background:rgba(123,63,228,.12);border:1px solid rgba(123,63,228,.25);border-radius:8px;padding:3px 10px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:var(--accent3);margin-top:4px}
.pneu-empresa{display:inline-flex;align-items:center;gap:5px;background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.25);border-radius:8px;padding:3px 10px;font-size:12px;font-weight:600;color:var(--blue);margin-top:4px}
.pneu-venda-data{display:inline-flex;align-items:center;gap:5px;background:rgba(100,116,139,.12);border:1px solid rgba(100,116,139,.25);border-radius:8px;padding:3px 10px;font-size:12px;font-weight:600;color:#94A3B8;margin-top:4px}

/* COUNTERS */
.counters{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
.counter-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:12px 14px;text-align:center}
.counter-num{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900}
.counter-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px}

/* EMPTY */
.empty{padding:40px 16px;text-align:center;color:var(--muted);font-size:13px}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.8);align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal-box{background:var(--bg3);border:1px solid var(--border2);border-radius:24px 24px 0 0;padding:20px 20px 48px;width:100%;max-width:500px;max-height:92vh;overflow-y:auto}
.modal-handle{width:44px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;color:var(--text);margin-bottom:16px;text-transform:uppercase}
.mfg{margin-bottom:13px}
.mfg label{display:block;font-size:10px;font-weight:700;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.mfv{background:var(--bg2);border-radius:10px;padding:10px 14px;font-size:13px;color:var(--muted)}
.mfv.destaque{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;color:var(--accent3)}
.modal-input{width:100%;padding:13px 16px;border:1.5px solid var(--border2);border-radius:12px;font-size:16px;font-family:'Barlow',sans-serif;color:var(--text);background:var(--bg2);outline:none;transition:.2s}
.modal-input:focus{border-color:var(--accent)}
.modal-input::placeholder{color:var(--muted)}
.modal-input.fogo{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;letter-spacing:2px;text-transform:uppercase}
.modal-select{width:100%;padding:13px 16px;border:1.5px solid var(--border2);border-radius:12px;font-size:15px;font-family:'Barlow',sans-serif;color:var(--text);background:var(--bg2);outline:none;transition:.2s;appearance:none;cursor:pointer}
.modal-select:focus{border-color:var(--accent)}
.modal-btns{display:flex;gap:10px;margin-top:20px}
.btn-cancel{padding:14px 18px;border:1.5px solid var(--border2);border-radius:12px;background:transparent;font-size:14px;color:var(--muted);cursor:pointer;font-family:'Barlow',sans-serif}
.btn-confirm{flex:1;padding:14px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:12px;color:white;font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;letter-spacing:1px;cursor:pointer}
.btn-confirm:active{opacity:.8}
.btn-confirm.green{background:linear-gradient(135deg,var(--green),#059669)}
.btn-confirm.red{background:linear-gradient(135deg,var(--red),#B91C1C)}

/* STATUS OPTIONS */
.status-options{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.status-opt{padding:12px;border:1.5px solid var(--border2);border-radius:12px;text-align:center;cursor:pointer;transition:.15s;font-size:13px;font-weight:600}
.status-opt:active,.status-opt.sel{border-color:var(--accent);background:rgba(123,63,228,.1);color:var(--accent3)}

/* TOAST */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:12px 22px;border-radius:24px;font-size:13px;font-weight:600;z-index:300;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.toast.show{opacity:1}

/* SEPARADOR */
.sep{height:1px;background:var(--border);margin:12px 0}
</style>
</head>
<body>

<div class="app-header">
  <div class="header-left">
    <a class="btn-back" href="index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="17" height="17"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    </a>
    <div class="header-title">Estoque</div>
  </div>
  <div class="header-badge">PNEUS</div>
</div>

<div class="sync-bar" id="syncBar"></div>

<div class="tabs">
  <div class="tab on"  onclick="showTab('todos')">Todos</div>
  <div class="tab"     onclick="showTab('disponivel')">Disponível</div>
  <div class="tab"     onclick="showTab('em_uso')">Em Uso</div>
  <div class="tab"     onclick="showTab('reforma')">Reforma</div>
  <div class="tab"     onclick="showTab('venda')">Venda</div>
  <div class="tab"     onclick="showTab('outros')">Outros</div>
</div>

<div id="s-todos" class="scr on pad">
  <div class="counters" id="counters"></div>
  <div class="srch-wrap">
    <svg class="srch-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input class="srch" placeholder="Buscar por nº fogo, medida..." oninput="filtrar(this.value)">
  </div>
  <div id="lista-todos"></div>
</div>

<div id="s-disponivel" class="scr pad"><div id="lista-disponivel"></div></div>
<div id="s-em_uso"     class="scr pad"><div id="lista-em_uso"></div></div>
<div id="s-reforma"    class="scr pad"><div id="lista-reforma"></div></div>
<div id="s-venda"      class="scr pad"><div id="lista-venda"></div></div>
<div id="s-outros"     class="scr pad"><div id="lista-outros"></div></div>

<!-- FAB -->
<button class="fab" onclick="abrirModalAdicionar()">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18"><path d="M12 5v14M5 12h14"/></svg>
  Adicionar Pneu
</button>

<!-- MODAL ADICIONAR PNEU -->
<div class="modal-overlay" id="modalAdicionar">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-title">➕ Adicionar Pneu</div>
    <div class="mfg">
      <label>Nº de Fogo</label>
      <input class="modal-input fogo" id="add-fogo" placeholder="Ex: 14500" inputmode="numeric">
    </div>
    <div class="mfg">
      <label>Medida</label>
      <select class="modal-select" id="add-medida">
        <option value="">Selecione a medida...</option>
        <option>275/80R22.5</option>
        <option>295/80R22.5</option>
        <option>315/80R22.5</option>
        <option>11R22.5</option>
        <option>12R22.5</option>
        <option>1000R20</option>
        <option>900R20</option>
        <option>750R16</option>
        <option>Outra</option>
      </select>
    </div>
    <div class="mfg" id="add-medida-outro-wrap" style="display:none">
      <label>Informe a medida</label>
      <input class="modal-input" id="add-medida-outro" placeholder="Ex: 385/65R22.5">
    </div>
    <div class="mfg">
      <label>Vida Útil</label>
      <select class="modal-select" id="add-vida">
        <option value="">Selecione...</option>
        <option value="novo">🆕 Novo</option>
        <option value="1reforma">1ª Reforma</option>
        <option value="2reforma">2ª Reforma</option>
      </select>
    </div>
    <div class="mfg">
      <label>Status Inicial</label>
      <select class="modal-select" id="add-status">
        <option value="disponivel">✅ Disponível</option>
        <option value="venda">💰 Para Venda</option>
        <option value="recuperacao">🔧 Recuperação</option>
        <option value="descarte">🗑 Descarte</option>
      </select>
    </div>
    <div class="mfg">
      <label>Sulco (mm)</label>
      <input class="modal-input" id="add-sulco" placeholder="Ex: 8.5" type="number" min="0" max="25" step="0.5">
    </div>
    <div class="mfg">
      <label>Observação</label>
      <input class="modal-input" id="add-obs" placeholder="Opcional...">
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="fecharModal('modalAdicionar')">Cancelar</button>
      <button class="btn-confirm green" onclick="salvarPneu()">✓ Salvar</button>
    </div>
  </div>
</div>

<!-- MODAL DETALHE/AÇÕES DO PNEU -->
<div class="modal-overlay" id="modalDetalhe">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div class="modal-title" style="margin:0" id="det-fogo-title">—</div>
      <div id="det-status-badge"></div>
    </div>
    <div class="mfg">
      <label>Detalhes</label>
      <div class="mfv" id="det-info">—</div>
    </div>
    <div id="det-frota-wrap" style="display:none" class="mfg">
      <label>Frota Vinculada</label>
      <div class="mfv destaque" id="det-frota">—</div>
    </div>
    <div id="det-empresa-wrap" style="display:none" class="mfg">
      <label>Empresa Reformadora</label>
      <div class="mfv destaque" id="det-empresa">—</div>
    </div>
    <div id="det-venda-wrap" style="display:none" class="mfg">
      <label>Data da Venda</label>
      <div class="mfv" id="det-venda-data">—</div>
    </div>
    <div class="sep"></div>
    <div class="modal-title" style="font-size:14px;margin-bottom:12px">ALTERAR STATUS</div>
    <div class="status-options" id="statusOpcoes"></div>

    <!-- Campo empresa reformadora (aparece ao selecionar reforma) -->
    <div id="campo-empresa" style="display:none;margin-top:12px">
      <div class="mfg">
        <label>Empresa Reformadora</label>
        <input class="modal-input" id="det-empresa-input" placeholder="Nome da empresa...">
      </div>
    </div>

    <!-- Campo data/info venda -->
    <div id="campo-venda-data" style="display:none;margin-top:12px">
      <div class="mfg">
        <label>Confirmar Venda — Data</label>
        <input class="modal-input" id="det-venda-data-input" placeholder="DD/MM/AAAA" type="date">
      </div>
    </div>

    <!-- Campo sulco -->
    <div style="margin-top:12px" class="mfg">
      <label>Atualizar Sulco (mm)</label>
      <input class="modal-input" id="det-sulco" placeholder="Ex: 6.0" type="number" min="0" max="25" step="0.5">
    </div>
    <!-- Obs -->
    <div class="mfg">
      <label>Observação</label>
      <input class="modal-input" id="det-obs" placeholder="Opcional...">
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="fecharModal('modalDetalhe')">Cancelar</button>
      <button class="btn-confirm" onclick="salvarAlteracao()">✓ Confirmar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw4BZz60sy9BsFACdqKktKpzJOfP8mj0U6s1G7Em5pwhaC_kQHCk-GPbLNZOlwjvrOwsw/exec';

const STATUS_LABEL = {
  disponivel:  '✅ Disponível',
  em_uso:      '🔵 Em Uso',
  aguardando:  '⏳ Aguard. Reformadora',
  reformadora: '🔄 Na Reformadora',
  recuperacao: '🔧 Recuperação',
  venda:       '💰 Para Venda',
  vendido:     '🏷 Vendido',
  descarte:    '🗑 Descarte',
};

const STATUS_CLASS = {
  disponivel:  's-disponivel',
  em_uso:      's-em_uso',
  aguardando:  's-aguardando',
  reformadora: 's-reformadora',
  recuperacao: 's-recuperacao',
  venda:       's-venda',
  vendido:     's-vendido',
  descarte:    's-descarte',
};

const VIDA_LABEL = {
  novo:     '🆕 Novo',
  '1reforma':'1ª Reforma',
  '2reforma':'2ª Reforma',
};

// ── ESTADO ────────────────────────────────────────────────────
let estoque = [];
let curPneu = null;
let curTab  = 'todos';
let novoStatus = null;

// ── INIT ──────────────────────────────────────────────────────
function init() {
  estoque = lerLocal('twm_estoque') || [];
  render();
  setTimeout(sincronizar, 1000);
}

// ── SYNC ──────────────────────────────────────────────────────
function sincronizar() {
  setSyncBar('⏳ Sincronizando...');
  fetch(SCRIPT_URL + '?action=getEstoque')
    .then(r => r.json())
    .then(d => {
      if (d.ok && d.estoque && d.estoque.length) {
        estoque = d.estoque;
        salvarLocal('twm_estoque', estoque);
        render();
      }
      setSyncBar('✅ Sincronizado', 2000);
    })
    .catch(() => setSyncBar('📵 Offline — dados locais', 2000));
}

function setSyncBar(msg, hideAfter) {
  const el = document.getElementById('syncBar');
  el.textContent = msg; el.style.display = 'block';
  if (hideAfter) setTimeout(() => el.style.display = 'none', hideAfter);
}

// ── TABS ──────────────────────────────────────────────────────
function showTab(t) {
  curTab = t;
  document.querySelectorAll('.scr').forEach(s => s.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('on'));
  document.getElementById('s-'+t).classList.add('on');
  document.querySelectorAll('.tab').forEach((x,i) => {
    if (['todos','disponivel','em_uso','reforma','venda','outros'][i] === t) x.classList.add('on');
  });
  renderLista(t);
}

// ── RENDER GERAL ──────────────────────────────────────────────
function render() {
  renderCounters();
  renderLista(curTab);
}

function renderCounters() {
  const tots = {
    disponivel: estoque.filter(p => p.status === 'disponivel').length,
    em_uso:     estoque.filter(p => p.status === 'em_uso').length,
    reforma:    estoque.filter(p => ['aguardando','reformadora'].includes(p.status)).length,
    venda:      estoque.filter(p => ['venda','vendido'].includes(p.status)).length,
  };
  document.getElementById('counters').innerHTML = `
    <div class="counter-card">
      <div class="counter-num" style="color:var(--green)">${tots.disponivel}</div>
      <div class="counter-label">Disponível</div>
    </div>
    <div class="counter-card">
      <div class="counter-num" style="color:var(--accent3)">${tots.em_uso}</div>
      <div class="counter-label">Em Uso</div>
    </div>
    <div class="counter-card">
      <div class="counter-num" style="color:var(--blue)">${tots.reforma}</div>
      <div class="counter-label">Reforma</div>
    </div>
    <div class="counter-card">
      <div class="counter-num" style="color:var(--accent2)">${tots.venda}</div>
      <div class="counter-label">Venda</div>
    </div>`;
}

function filtrar(val) {
  renderLista('todos', val);
}

function renderLista(tab, busca) {
  const b = (busca || '').toLowerCase();
  let lista = estoque;

  if (tab === 'disponivel') lista = estoque.filter(p => p.status === 'disponivel');
  else if (tab === 'em_uso') lista = estoque.filter(p => p.status === 'em_uso');
  else if (tab === 'reforma') lista = estoque.filter(p => ['aguardando','reformadora'].includes(p.status));
  else if (tab === 'venda') lista = estoque.filter(p => ['venda','vendido'].includes(p.status));
  else if (tab === 'outros') lista = estoque.filter(p => ['recuperacao','descarte'].includes(p.status));

  if (b) lista = lista.filter(p =>
    (p.fogo||'').toLowerCase().includes(b) ||
    (p.medida||'').toLowerCase().includes(b) ||
    (p.frota||'').toLowerCase().includes(b) ||
    (p.empresa||'').toLowerCase().includes(b)
  );

  // Ordena: disponível primeiro, depois em_uso, depois outros
  const ordem = ['disponivel','em_uso','aguardando','reformadora','recuperacao','venda','vendido','descarte'];
  lista.sort((a,b) => (ordem.indexOf(a.status)||99) - (ordem.indexOf(b.status)||99));

  const elId = tab === 'todos' ? 'lista-todos' : 'lista-'+tab;
  const el = document.getElementById(elId);
  if (!el) return;

  if (!lista.length) { el.innerHTML = '<div class="empty">Nenhum pneu encontrado.</div>'; return; }

  el.innerHTML = lista.map(p => {
    const extras = [];
    if (p.status === 'em_uso' && p.frota) {
      extras.push(`<div class="pneu-frota">🚛 ${p.frota}</div>`);
    }
    if (['aguardando','reformadora'].includes(p.status) && p.empresa) {
      extras.push(`<div class="pneu-empresa">🏭 ${p.empresa}</div>`);
    }
    if (p.status === 'vendido' && p.data_venda) {
      extras.push(`<div class="pneu-venda-data">📅 Vendido em ${p.data_venda}</div>`);
    }
    return `<div class="pneu-card" onclick="abrirDetalhe('${p.fogo}')">
      <div class="pneu-header">
        <div class="pneu-fogo">${p.fogo}</div>
        <div class="status-badge ${STATUS_CLASS[p.status]||''}">${STATUS_LABEL[p.status]||p.status}</div>
      </div>
      <div class="pneu-info">
        <div class="pneu-info-item">Medida: <span>${p.medida||'—'}</span></div>
        <div class="pneu-info-item">Vida: <span>${VIDA_LABEL[p.vida]||p.vida||'—'}</span></div>
        ${p.sulco ? `<div class="pneu-info-item">Sulco: <span>${p.sulco}mm</span></div>` : ''}
        ${p.data_entrada ? `<div class="pneu-info-item">Entrada: <span>${p.data_entrada}</span></div>` : ''}
      </div>
      ${extras.join('')}
      ${p.obs ? `<div style="font-size:11px;color:var(--muted);margin-top:6px">📝 ${p.obs}</div>` : ''}
    </div>`;
  }).join('');
}

// ── ADICIONAR PNEU ────────────────────────────────────────────
function abrirModalAdicionar() {
  document.getElementById('add-fogo').value = '';
  document.getElementById('add-medida').value = '';
  document.getElementById('add-vida').value = '';
  document.getElementById('add-status').value = 'disponivel';
  document.getElementById('add-sulco').value = '';
  document.getElementById('add-obs').value = '';
  document.getElementById('add-medida-outro-wrap').style.display = 'none';
  document.getElementById('modalAdicionar').classList.add('open');
  setTimeout(() => document.getElementById('add-fogo').focus(), 300);
}

document.getElementById('add-medida').addEventListener('change', function() {
  document.getElementById('add-medida-outro-wrap').style.display = this.value === 'Outra' ? 'block' : 'none';
});

function salvarPneu() {
  const fogo = document.getElementById('add-fogo').value.trim().toUpperCase();
  const medidaSel = document.getElementById('add-medida').value;
  const medida = medidaSel === 'Outra' ? document.getElementById('add-medida-outro').value.trim() : medidaSel;
  const vida   = document.getElementById('add-vida').value;
  const status = document.getElementById('add-status').value;
  const sulco  = document.getElementById('add-sulco').value;
  const obs    = document.getElementById('add-obs').value.trim();

  if (!fogo)   { showToast('⚠ Informe o Nº de Fogo'); return; }
  if (!medida) { showToast('⚠ Informe a medida'); return; }
  if (!vida)   { showToast('⚠ Informe a vida útil'); return; }

  // Verifica duplicata
  if (estoque.find(p => p.fogo === fogo)) { showToast('⚠ Nº de fogo já cadastrado!'); return; }

  const agora = new Date();
  const data_entrada = agora.toLocaleDateString('pt-BR');

  const pneu = { fogo, medida, vida, status, sulco: sulco||'', obs, data_entrada, frota:'', empresa:'', data_venda:'' };

  estoque.unshift(pneu);
  salvarLocal('twm_estoque', estoque);

  // Envia ao servidor
  enviarServidor({ action: 'salvarEstoque', operacao: 'adicionar', ...pneu });

  fecharModal('modalAdicionar');
  render();
  showToast('✅ Pneu adicionado ao estoque!');
}

// ── DETALHE / AÇÕES ───────────────────────────────────────────
function abrirDetalhe(fogo) {
  curPneu = estoque.find(p => p.fogo === fogo);
  if (!curPneu) return;
  novoStatus = curPneu.status;

  document.getElementById('det-fogo-title').textContent = '🔵 ' + curPneu.fogo;
  document.getElementById('det-status-badge').innerHTML = `<div class="status-badge ${STATUS_CLASS[curPneu.status]}">${STATUS_LABEL[curPneu.status]||curPneu.status}</div>`;
  document.getElementById('det-info').textContent =
    `${VIDA_LABEL[curPneu.vida]||curPneu.vida||'—'} · ${curPneu.medida||'—'}${curPneu.sulco ? ' · Sulco: '+curPneu.sulco+'mm' : ''}`;

  // Frota vinculada
  const frotaWrap = document.getElementById('det-frota-wrap');
  if (curPneu.status === 'em_uso' && curPneu.frota) {
    document.getElementById('det-frota').textContent = curPneu.frota;
    frotaWrap.style.display = 'block';
  } else { frotaWrap.style.display = 'none'; }

  // Empresa
  const empWrap = document.getElementById('det-empresa-wrap');
  if (['aguardando','reformadora'].includes(curPneu.status) && curPneu.empresa) {
    document.getElementById('det-empresa').textContent = curPneu.empresa;
    empWrap.style.display = 'block';
  } else { empWrap.style.display = 'none'; }

  // Data venda
  const vendaWrap = document.getElementById('det-venda-wrap');
  if (curPneu.status === 'vendido' && curPneu.data_venda) {
    document.getElementById('det-venda-data').textContent = curPneu.data_venda;
    vendaWrap.style.display = 'block';
  } else { vendaWrap.style.display = 'none'; }

  // Sulco e obs atuais
  document.getElementById('det-sulco').value = curPneu.sulco || '';
  document.getElementById('det-obs').value   = curPneu.obs   || '';

  // Campos extras
  document.getElementById('campo-empresa').style.display = 'none';
  document.getElementById('campo-venda-data').style.display = 'none';
  document.getElementById('det-empresa-input').value = curPneu.empresa || '';

  renderStatusOpcoes(curPneu.status);
  document.getElementById('modalDetalhe').classList.add('open');
}

function renderStatusOpcoes(statusAtual) {
  // Opções disponíveis por status atual
  const opcoes = {
    disponivel:  ['em_uso','aguardando','recuperacao','venda','descarte'],
    em_uso:      ['disponivel','aguardando','recuperacao','venda','descarte'],
    aguardando:  ['reformadora','disponivel','descarte'],
    reformadora: ['disponivel','descarte'],
    recuperacao: ['disponivel','venda','descarte'],
    venda:       ['vendido','disponivel','descarte'],
    vendido:     ['disponivel'],
    descarte:    ['disponivel'],
  };

  const label = {
    disponivel:  '✅ Disponível',
    em_uso:      '🔵 Montar no Caminhão',
    aguardando:  '⏳ Aguard. Reformadora',
    reformadora: '🔄 Enviar p/ Reformadora',
    recuperacao: '🔧 Recuperação',
    venda:       '💰 Para Venda',
    vendido:     '🏷 Marcar Vendido',
    descarte:    '🗑 Descarte',
  };

  const opts = opcoes[statusAtual] || [];
  document.getElementById('statusOpcoes').innerHTML = opts.map(s =>
    `<div class="status-opt ${s === novoStatus ? 'sel' : ''}" onclick="selecionarStatus('${s}')">${label[s]||s}</div>`
  ).join('');
}

function selecionarStatus(s) {
  novoStatus = s;
  document.querySelectorAll('.status-opt').forEach(el => {
    el.classList.toggle('sel', el.textContent.trim() === document.querySelector(`.status-opt[onclick*="${s}"]`)?.textContent.trim());
    // Reaplica corretamente
  });
  // Re-renderiza seleção visual
  document.querySelectorAll('.status-opt').forEach(el => {
    el.classList.remove('sel');
    if (el.getAttribute('onclick') === `selecionarStatus('${s}')`) el.classList.add('sel');
  });

  // Mostra campo empresa se aguardando ou reformadora
  document.getElementById('campo-empresa').style.display =
    ['aguardando','reformadora'].includes(s) ? 'block' : 'none';

  // Mostra campo data venda se vendido
  document.getElementById('campo-venda-data').style.display =
    s === 'vendido' ? 'block' : 'none';
}

function salvarAlteracao() {
  if (!curPneu) return;

  const idx = estoque.findIndex(p => p.fogo === curPneu.fogo);
  if (idx < 0) return;

  const sulco   = document.getElementById('det-sulco').value;
  const obs     = document.getElementById('det-obs').value.trim();
  const empresa = document.getElementById('det-empresa-input').value.trim();
  const dataVenda = document.getElementById('det-venda-data-input').value;

  // Validações
  if (['aguardando','reformadora'].includes(novoStatus) && !empresa && !estoque[idx].empresa) {
    // Empresa não obrigatória para "aguardando", mas obrigatória para "reformadora"
    if (novoStatus === 'reformadora' && !empresa) {
      showToast('⚠ Informe o nome da empresa reformadora'); return;
    }
  }
  if (novoStatus === 'vendido' && !dataVenda) {
    showToast('⚠ Informe a data da venda'); return;
  }

  // Atualiza vida útil ao voltar da reforma
  let vida = estoque[idx].vida;
  if (novoStatus === 'disponivel' && ['reformadora'].includes(estoque[idx].status)) {
    if (vida === 'novo') vida = '1reforma';
    else if (vida === '1reforma') vida = '2reforma';
  }

  // Atualiza objeto
  estoque[idx] = {
    ...estoque[idx],
    status: novoStatus,
    sulco:  sulco || estoque[idx].sulco,
    obs:    obs   || estoque[idx].obs,
    empresa: empresa || estoque[idx].empresa,
    vida,
    data_venda: novoStatus === 'vendido' ? formatarData(dataVenda) : estoque[idx].data_venda,
    // Limpa frota se saiu de em_uso
    frota: novoStatus === 'em_uso' ? (estoque[idx].frota||'') : (novoStatus === 'disponivel' ? '' : estoque[idx].frota),
  };

  salvarLocal('twm_estoque', estoque);
  enviarServidor({ action: 'salvarEstoque', operacao: 'atualizar', ...estoque[idx] });

  fecharModal('modalDetalhe');
  render();
  showToast('✅ Pneu atualizado!');
}

// Chamada pelo app de pneus quando monta/desmonta
function atualizarEstoquePorTroca(fogoNovo, fogoAntigo, frota) {
  // Pneu novo montado → marca como Em Uso
  const idxNovo = estoque.findIndex(p => p.fogo === fogoNovo);
  if (idxNovo >= 0) {
    estoque[idxNovo].status = 'em_uso';
    estoque[idxNovo].frota  = frota;
    enviarServidor({ action: 'salvarEstoque', operacao: 'atualizar', ...estoque[idxNovo] });
  }
  // Pneu antigo desmontado → volta ao estoque como disponível
  const idxAntigo = estoque.findIndex(p => p.fogo === fogoAntigo);
  if (idxAntigo >= 0 && fogoAntigo && fogoAntigo !== fogoNovo) {
    estoque[idxAntigo].status = 'disponivel';
    estoque[idxAntigo].frota  = '';
    enviarServidor({ action: 'salvarEstoque', operacao: 'atualizar', ...estoque[idxAntigo] });
  }
  salvarLocal('twm_estoque', estoque);
}

// ── HELPERS ───────────────────────────────────────────────────
function formatarData(iso) {
  if (!iso) return '';
  const [y,m,d] = iso.split('-');
  return `${d}/${m}/${y}`;
}

function fecharModal(id) {
  document.getElementById(id).classList.remove('open');
  curPneu = null; novoStatus = null;
}

document.getElementById('modalAdicionar').addEventListener('click', function(e) { if(e.target===this) fecharModal('modalAdicionar'); });
document.getElementById('modalDetalhe').addEventListener('click',  function(e) { if(e.target===this) fecharModal('modalDetalhe'); });

function enviarServidor(dados) {
  if (!navigator.onLine) return;
  fetch(SCRIPT_URL, {
    method: 'POST', mode: 'no-cors',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(dados)
  }).catch(() => {});
}

function salvarLocal(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {} }
function lerLocal(k) { try { return JSON.parse(localStorage.getItem(k)); } catch(e) { return null; } }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

init();
</script>
