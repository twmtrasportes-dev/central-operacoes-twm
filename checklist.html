<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TWM Check List</title>
<style>
  body{background:#4C1D95;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;font-family:sans-serif;color:white}
  .loader{text-align:center}
  .dot{width:8px;height:8px;background:white;border-radius:50%;display:inline-block;animation:bounce .6s infinite alternate;margin:0 3px}
  .dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
  @keyframes bounce{to{transform:translateY(-8px);opacity:.5}}
  p{font-size:12px;color:rgba(255,255,255,.5);margin-top:16px;letter-spacing:2px;text-transform:uppercase}
</style>
</head>
<body>
<div class="loader">
  <div><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
  <p>Check List Frota</p>
</div>
<script>
  sessionStorage.setItem('twm_goto', 'checklist');
  window.location.replace('check_list_twm_oficial-.html');
</script>
</body>
</html>
