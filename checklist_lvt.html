<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0A0A0F">
<title>TWM — Check-List Seg. Diário / LVT</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icone-192.png">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0A0A0F;--bg2:#0F0F18;--bg3:#13131E;--border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.14);--text:#F0EEF8;--muted:#7A7890;--accent:#7B3FE4;--accent2:#A855F7;--accent3:#C084FC;--green:#10B981;--red:#EF4444;--gold:#F59E0B;--blue:#3B82F6}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;overscroll-behavior:none}
.app-header{background:var(--bg2);border-bottom:1px solid var(--border2);padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-left{display:flex;align-items:center;gap:10px}
.btn-back{width:36px;height:36px;background:rgba(255,255,255,.07);border:1px solid var(--border2);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text)}
.header-title{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:800;letter-spacing:1px;text-transform:uppercase}
.header-badge{background:linear-gradient(135deg,var(--red),#B91C1C);border-radius:8px;padding:3px 10px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;color:white;letter-spacing:1px}
.screen{display:none}.screen.active{display:block}
.pad{padding:14px}
.srch-wrap{position:relative;margin-bottom:12px}
.srch{width:100%;padding:12px 14px 12px 40px;font-size:14px;border:1.5px solid var(--border2);border-radius:12px;background:var(--bg3);color:var(--text);outline:none;font-family:'Barlow',sans-serif}
.srch:focus{border-color:var(--accent)}
.srch::placeholder{color:var(--muted)}
.srch-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
.list-card{background:var(--bg3);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.vrow{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:.15s}
.vrow:last-child{border-bottom:none}
.vrow:active{background:rgba(123,63,228,.08)}
.vf{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;color:var(--text)}
.vi{font-size:11px;color:var(--muted);margin-top:2px}
.varr{color:var(--accent3);font-size:22px}
.empty{padding:40px 16px;text-align:center;color:var(--muted);font-size:13px}
.hist-item{padding:13px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:.15s}
.hist-item:last-child{border-bottom:none}
.hist-item:active{background:rgba(123,63,228,.08)}
.hist-data{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;color:var(--text)}
.hist-info{font-size:11px;color:var(--muted);margin-top:3px}
.hist-status{font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px}
.hist-ok{background:rgba(16,185,129,.15);color:var(--green)}
.hist-nok{background:rgba(239,68,68,.15);color:var(--red)}
.form-scroll{padding:14px;padding-bottom:100px}
.form-header{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:16px;margin-bottom:14px}
.form-header h2{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:800;color:var(--red);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.form-row{margin-bottom:10px}
.form-row label{display:block;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:5px}
.form-input{width:100%;padding:11px 14px;border:1.5px solid var(--border2);border-radius:10px;background:var(--bg3);color:var(--text);font-size:14px;font-family:'Barlow',sans-serif;outline:none}
.form-input:focus{border-color:var(--red)}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.section{background:var(--bg3);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:12px}
.section-header{padding:10px 16px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;color:white;letter-spacing:1px;text-transform:uppercase}
.sec-docs .section-header{background:#1D4ED8}
.sec-veiculo .section-header{background:#065F46}
.sec-epi .section-header{background:#7C2D12}
.sec-kit .section-header{background:#92400E}
.sec-tanque .section-header{background:#1E3A5F}
.sec-pos .section-header{background:#4C1D95}
.item-row{display:flex;align-items:center;padding:11px 14px;border-bottom:1px solid var(--border);gap:10px}
.item-row:last-child{border-bottom:none}
.item-num{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:800;color:var(--accent3);min-width:26px}
.item-desc{flex:1;font-size:11px;color:var(--text);line-height:1.4}
.item-venc{font-size:10px;color:var(--gold);margin-top:2px}
.item-btns{display:flex;gap:5px;flex-shrink:0}
.btn-opt{width:36px;height:36px;border-radius:8px;border:1.5px solid var(--border2);background:transparent;cursor:pointer;font-size:11px;font-weight:700;color:var(--muted);transition:.15s;display:flex;align-items:center;justify-content:center}
.btn-opt.sim-sel{background:rgba(16,185,129,.2);border-color:var(--green);color:var(--green)}
.btn-opt.nao-sel{background:rgba(239,68,68,.2);border-color:var(--red);color:var(--red)}
.obs-wrap{background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:12px}
.obs-wrap label{display:block;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px}
.obs-textarea{width:100%;padding:12px;border:1.5px solid var(--border2);border-radius:10px;background:var(--bg);color:var(--text);font-size:13px;font-family:'Barlow',sans-serif;outline:none;resize:none;min-height:80px}
.obs-textarea:focus{border-color:var(--red)}
.liberar-wrap{background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:12px}
.liberar-wrap label{display:block;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px}
.liberar-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-lib{padding:14px;border-radius:12px;border:2px solid var(--border2);background:transparent;font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;cursor:pointer;transition:.15s;color:var(--muted)}
.btn-lib.lib-sim{border-color:var(--green);background:rgba(16,185,129,.15);color:var(--green)}
.btn-lib.lib-nao{border-color:var(--red);background:rgba(239,68,68,.15);color:var(--red)}
.fab-salvar{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,var(--red),#B91C1C);border:none;border-radius:50px;padding:14px 32px;color:white;font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;letter-spacing:1px;cursor:pointer;box-shadow:0 4px 20px rgba(239,68,68,.4);z-index:90;white-space:nowrap}
.fab-salvar:active{opacity:.85}
.btn-print{display:flex;align-items:center;gap:8px;padding:10px 16px;background:var(--bg3);border:1.5px solid var(--border2);border-radius:10px;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;font-family:'Barlow',sans-serif;width:100%;justify-content:center;margin-bottom:12px}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:12px 22px;border-radius:24px;font-size:13px;font-weight:600;z-index:300;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.toast.show{opacity:1}
body.light{--bg:#F4F3FF;--bg2:#FFFFFF;--bg3:#FAFAFA;--border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.13);--text:#1A1A2E;--muted:#6B6880}
@media print {
  body{background:white!important;color:#000!important}
  .app-header,.fab-salvar,.toast,.btn-print{display:none!important}
  .screen{display:block!important}
  #screen-form{display:block!important}
  #screen-lista,#screen-hist,#screen-view{display:none!important}
  .section-header{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .item-row{page-break-inside:avoid;font-size:9px}
}
</style>
<script>
(function(){
  if(localStorage.getItem('twm_tema')==='claro'){
    document.addEventListener('DOMContentLoaded',function(){document.body.classList.add('light');});
    if(document.readyState!=='loading') document.body.classList.add('light');
  }
})();
</script>
</head>
<body>

<div class="app-header">
  <div class="header-left">
    <div class="btn-back" onclick="voltar()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="17" height="17"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    </div>
    <div class="header-title" id="headerTitle">LVT — Check-List Diário</div>
  </div>
  <div class="header-badge">LVT</div>
</div>

<!-- LISTA DE FROTAS -->
<div id="screen-lista" class="screen active pad">
  <div class="srch-wrap">
    <svg class="srch-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input class="srch" id="srchFrota" placeholder="Buscar frota..." oninput="filtrarFrotas(this.value)">
  </div>
  <div class="list-card" id="listaFrotas"></div>
</div>

<!-- HISTÓRICO -->
<div id="screen-hist" class="screen pad">
  <div style="display:flex;gap:10px;margin-bottom:14px">
    <button onclick="novoChecklist()" style="flex:1;padding:13px;background:linear-gradient(135deg,var(--red),#B91C1C);border:none;border-radius:12px;color:white;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;cursor:pointer">+ Nova LVT</button>
  </div>
  <div class="list-card" id="listaHist"></div>
</div>

<!-- FORMULÁRIO -->
<div id="screen-form" class="screen">
  <div class="form-scroll">

    <!-- Identificação -->
    <div class="form-header">
      <h2>🔴 LVT — Identificação</h2>
      <div class="form-row-2">
        <div class="form-row"><label>Data</label><input class="form-input" id="f-data" type="date"></div>
        <div class="form-row"><label>Hora</label><input class="form-input" id="f-hora" type="time"></div>
      </div>
      <div class="form-row"><label>UN / Expedidor</label><input class="form-input" id="f-un" placeholder="Ex: Petrobras Betim"></div>
      <div class="form-row"><label>Cód. Agendamento</label><input class="form-input" id="f-agend" placeholder="Código SAP"></div>
      <div class="form-row"><label>Cliente</label><input class="form-input" id="f-cliente" placeholder="Nome do cliente"></div>
      <div class="form-row"><label>Nº ORP / ODP</label><input class="form-input" id="f-orp" placeholder="Número ORP"></div>
      <div class="form-row"><label>Nº NF (Descarga)</label><input class="form-input" id="f-nf" placeholder="Número da NF"></div>
      <div class="form-row"><label>Produto(s)</label><input class="form-input" id="f-produto" placeholder="Ex: DIESEL S10"></div>
      <div class="form-row"><label>Motorista</label><input class="form-input" id="f-motorista" placeholder="Nome completo"></div>
      <div class="form-row-2">
        <div class="form-row"><label>VP (Frota)</label><input class="form-input" id="f-vp" readonly style="opacity:.7"></div>
        <div class="form-row"><label>Placa Cavalo</label><input class="form-input" id="f-placa-cav" placeholder="AAA-0000"></div>
      </div>
      <div class="form-row"><label>Ano Fab. Cavalo</label><input class="form-input" id="f-ano-cav" type="number" placeholder="Ex: 2020"></div>
      <div class="form-row-2">
        <div class="form-row"><label>Placa Carreta 1</label><input class="form-input" id="f-placa-car1" placeholder="AAA-0000"></div>
        <div class="form-row"><label>Ano Fab.</label><input class="form-input" id="f-ano-car1" type="number" placeholder="2018"></div>
      </div>
      <div class="form-row-2">
        <div class="form-row"><label>Placa Carreta 2</label><input class="form-input" id="f-placa-car2" placeholder="AAA-0000"></div>
        <div class="form-row"><label>Ano Fab.</label><input class="form-input" id="f-ano-car2" type="number" placeholder="2018"></div>
      </div>
      <div class="form-row"><label>Nº CNH / Categoria / Vencimento</label><input class="form-input" id="f-cnh" placeholder="Ex: 12345678 / E / 12/2026"></div>
      <div class="form-row"><label>Capacidade Carreta 1</label><input class="form-input" id="f-cap1" placeholder="Volume e/ou Peso"></div>
      <div class="form-row"><label>Capacidade Carreta 2</label><input class="form-input" id="f-cap2" placeholder="Volume e/ou Peso (se houver)"></div>
    </div>

    <!-- SEÇÃO DOCUMENTOS -->
    <div class="section sec-docs" id="sec-docs">
      <div class="section-header">📄 Documentos</div>
    </div>

    <!-- SEÇÃO CONDIÇÕES DO VEÍCULO -->
    <div class="section sec-veiculo" id="sec-veiculo">
      <div class="section-header">🚛 Condições do Veículo</div>
    </div>

    <!-- SEÇÃO EPI -->
    <div class="section sec-epi" id="sec-epi">
      <div class="section-header">🦺 EPI — Equipamentos de Proteção Individual</div>
    </div>

    <!-- SEÇÃO KIT EMERGÊNCIA -->
    <div class="section sec-kit" id="sec-kit">
      <div class="section-header">🧰 Kit de Emergência</div>
    </div>

    <!-- SEÇÃO TANQUE / CARRETA -->
    <div class="section sec-tanque" id="sec-tanque">
      <div class="section-header">🛢 Condições do Tanque / Carreta</div>
    </div>

    <!-- SEÇÃO PÓS CARREGAMENTO -->
    <div class="section sec-pos" id="sec-pos">
      <div class="section-header">📋 Documentos Pós Carregamento</div>
    </div>

    <!-- Observações -->
    <div class="obs-wrap">
      <label>Registro de Observações</label>
      <textarea class="obs-textarea" id="f-obs" placeholder="Registre aqui qualquer observação relevante..."></textarea>
    </div>

    <!-- Últimas 3 viagens -->
    <div class="obs-wrap">
      <label>Últimas 3 viagens (produtos)</label>
      <div class="form-row-3">
        <div><label>1ª</label><input class="form-input" id="f-viagem1" placeholder="Produto"></div>
        <div><label>2ª</label><input class="form-input" id="f-viagem2" placeholder="Produto"></div>
        <div><label>3ª</label><input class="form-input" id="f-viagem3" placeholder="Produto"></div>
      </div>
    </div>

    <!-- Assinaturas -->
    <div class="obs-wrap">
      <label>Responsável pela Transportadora</label>
      <input class="form-input" id="f-resp-transp" placeholder="Nome completo">
      <div style="margin-top:8px"><label style="font-size:10px;color:var(--muted)">RG</label><input class="form-input" id="f-rg-transp" placeholder="Número do RG"></div>
    </div>
    <div class="obs-wrap">
      <label>Responsável pela Vistoria</label>
      <input class="form-input" id="f-resp-vistoria" placeholder="Nome completo">
      <div style="margin-top:8px"><label style="font-size:10px;color:var(--muted)">Matrícula</label><input class="form-input" id="f-mat-vistoria" placeholder="Matrícula"></div>
    </div>

    <!-- Liberação -->
    <div class="liberar-wrap">
      <label>Veículo Liberado para Carregamento?</label>
      <div class="liberar-btns">
        <button class="btn-lib" id="btn-lib-sim" onclick="setLib('sim')">✅ LIBERADO</button>
        <button class="btn-lib" id="btn-lib-nao" onclick="setLib('nao')">❌ NÃO LIBERADO</button>
      </div>
    </div>

    <button class="btn-print" onclick="window.print()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
      Imprimir LVT
    </button>

  </div>
  <button class="fab-salvar" onclick="salvarLVT()">💾 Salvar LVT</button>
</div>

<!-- VISUALIZAÇÃO -->
<div id="screen-view" class="screen pad" style="padding-bottom:80px">
  <div id="viewContent"></div>
  <button class="btn-print" onclick="window.print()" style="margin-top:14px">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
    Imprimir LVT
  </button>
</div>

<div class="toast" id="toast"></div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw4BZz60sy9BsFACdqKktKpzJOfP8mj0U6s1G7Em5pwhaC_kQHCk-GPbLNZOlwjvrOwsw/exec';

// ── ITENS DA LVT ──────────────────────────────────────────────
const SECOES = [
  { id:'docs', itens:[
    {n:1, desc:'CIPP – Certificado de Inspeção para Transporte de Produtos Perigosos no prazo de validade', venc:true},
    {n:2, desc:'CIV – Certificado de Inspeção Veicular no prazo de validade', venc:true},
    {n:3, desc:'MOPP - Habilitação para transporte de produtos perigosos', venc:true},
    {n:4, desc:'CNH - Carteira Nacional de Habilitação válida e compatível com o veículo', venc:true},
    {n:5, desc:'AATPP – Autorização Ambiental para o Transporte Interestadual de Produtos Perigosos', venc:true},
    {n:6, desc:'CRLV – Certificado de Registro e Licenciamento de Veículo válido', venc:true},
    {n:7, desc:'Certificado da ANTT do RNTRC (Registro Nacional de Transportadores Rodoviários de Carga) válido', venc:true},
    {n:8, desc:'Certificado de Aferição / Verificação de Volume', venc:true},
  ]},
  { id:'veiculo', itens:[
    {n:9,  desc:'Pneus e estepe em bom estado (com sulcos mínimos TWI >= 1,6mm)'},
    {n:10, desc:'Rodas possuem todos os parafusos'},
    {n:11, desc:'Faróis (alto e baixo), setas, pisca alerta, lanternas, luzes de freio, marcha ré com sinal sonoro obrigatório, buzina, limpador de para-brisas em perfeito estado'},
    {n:12, desc:'Emissões (fumaça preta) dentro dos limites — Portaria 85/1996 IBAMA'},
    {n:13, desc:'Fiação elétrica em dutos metálicos ou PVC (isolamento perfeito e bateria isolada)'},
    {n:14, desc:'Integridade dos espelhos retrovisores externos, interno e integridade do para-brisas'},
    {n:15, desc:'Cinto de segurança de três pontos'},
    {n:16, desc:'Operacionalidade da Chave geral (blindada com L/D ligado no polo positivo da bateria)'},
    {n:17, desc:'Pala de proteção interna (contra o sol) para o motorista'},
    {n:18, desc:'Chave de rodas, triângulo e macaco'},
    {n:19, desc:'Tacógrafo ou controlador eletrônico'},
    {n:20, desc:'Extintor de incêndio de cabine dentro da validade'},

  { id:'epi', itens:[

    {n:22, desc:'Capacete com jugular (CA)'},
    {n:23, desc:'Protetor auricular (CA)'},
    {n:24, desc:'Proteção respiratória semi-facial com filtro químico para vapores orgânicos (CA)'},
    {n:25, desc:'Óculos ampla visão com proteção lateral (CA)'},
    {n:26, desc:'Cinto de segurança para trabalho em altura — obrigatório nas baias de carregamento (CA)'},
    {n:27, desc:'Uniforme: calça de brim/algodão, camisa manga longa e bota de couro fechada'},
  ]},
  { id:'kit', itens:[
    {n:28, desc:'Calços nas dimensões mínimas 150x200x150mm — 2 unid. (semirreboque) ou 4 unid. (bitrem/bitrenzão)'},
    {n:29, desc:'Jogo de ferramentas: alicate universal, chave de fenda/philips, chave para desconexão da bateria'},
    {n:30, desc:'04 cones para sinalização nas cores laranja e branca refletiva'},
    {n:31, desc:'02 Extintores PQS 8kg ou 03 Extintores CO2 6kg dentro da validade (um em cada lateral)'},
  ]},
  { id:'tanque', itens:[
    {n:32, desc:'Produto a ser carregado é compatível com o CIPP e com produtos da viagem anterior, ou tanque isento de remanescentes (inclusive ÁGUA)'},
    {n:33, desc:'Tanque e dispositivos compatíveis com o produto transportado (NBR 14619): mangotes, tubulações, engates, bombas, válvulas, vedações'},

    {n:35, desc:'Painéis de segurança, rótulos de risco e número ONU conforme produto(s) a ser(em) carregado(s)'},
    {n:36, desc:'Escada de acesso e plataforma com piso antiderrapante junto à boca de carregamento'},
    {n:37, desc:'Capacidade dos compartimentos demarcados'},
    {n:38, desc:'Juntas de vedação, válvulas, flanges, tampões (CAP) limpos e sem vazamentos'},
    {n:39, desc:'Dispositivo de alívio de pressão e vácuo em perfeito funcionamento (Suspiros)'},
    {n:40, desc:'Todas as saídas de produtos em bom estado e sem vazamento'},
    {n:41, desc:'Parte superior do tanque isenta de qualquer objeto estranho (NBR 7500)'},
    {n:42, desc:'Acessórios (mangotes, funis, conexões, prolongadores) em perfeitas condições, sem vazamentos e sem emendas'},
    {n:43, desc:'Todos os eixos da composição abaixados'},
    {n:44, desc:'Faixas reflexivas no tanque conforme Deliberação nº 30 do CONTRAN de 19/12/2001'},
    {n:45, desc:'Número do telefone de emergência legível'},
    {n:46, desc:'Para-choque traseiro com altura máxima 400mm, faixas oblíquas nas cores vermelha e branca reflexivas'},
    {n:47, desc:'Setas de nível'},
  ]},
  { id:'pos', itens:[
    {n:48, desc:'DANFE — Documento Auxiliar da Nota Fiscal Eletrônica'},
  ]},
];

// ── ESTADO ────────────────────────────────────────────────────
let todasFrotas = [];
let frotaAtual = null;
let respostas = {};
let vencimentos = {};
let liberado = null;
let telaAtual = 'lista';

const FROTAS_FIXAS = [
  'VP-183','VP-184','VPL-185','VPL-186','VPL-187','VPL-188','VPL-189','VPL-190',
  'VPL-191','VP-192','VP-193','VP-194','VP-195','VP-196','VP-197','VP-203',
  'VP-306','VP-307','VP-308','VP-309','VPL-311','VPL-312','VPL-313','VPL-314',
  'VPL-315','VPL-316','VPL-317','VPL-318','VPL-319','VPL-320','VPL-321','VPL-322',
  'VPL-323','VP-324','VP-446','VP-447','VP-448','VP-449','VP-450','VP-451',
  'VP-452','VP-453','VP-454','VP-455','VP-456','VP-457','VP-458','VP-459',
  'VP-460','VP-461','VP-462','VP-463','VP-464','VP-465','VP-517','VP-518',
  'VP-519','VP-520','VP-521','VP-522','VP-523','VP-611','VP-612','VP-613'
];

function salvarLocal(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function lerLocal(k){try{return JSON.parse(localStorage.getItem(k));}catch(e){return null;}}

// ── FROTAS ────────────────────────────────────────────────────
function carregarFrotas() {
  const cache = lerLocal('twm_frotas_lvt') || [];
  todasFrotas = (cache.length ? cache : FROTAS_FIXAS).map(f => ({f, tipo: f.startsWith('RB') ? 'Carreta' : 'Cavalo'}));
  renderFrotas('');

  fetch(SCRIPT_URL + '?action=getFrotasChecklist')
    .then(r => r.json())
    .then(d => {
      if (d.ok && d.frotas && d.frotas.length) {
        const todas = [...new Set([...FROTAS_FIXAS, ...d.frotas])].sort();
        salvarLocal('twm_frotas_lvt', todas);
        todasFrotas = todas.map(f => ({f, tipo: f.startsWith('RB') ? 'Carreta' : 'Cavalo'}));
        renderFrotas(document.getElementById('srchFrota').value);
      }
    }).catch(()=>{});
}

function filtrarFrotas(val) { renderFrotas(val); }

function renderFrotas(filtro) {
  if (!todasFrotas.length) todasFrotas = FROTAS_FIXAS.map(f => ({f, tipo:'Cavalo'}));
  const f = (filtro||'').toLowerCase();
  const fil = f ? todasFrotas.filter(v => v.f.toLowerCase().includes(f)) : todasFrotas;
  const el = document.getElementById('listaFrotas');
  if (!fil.length) { el.innerHTML = '<div class="empty">Nenhum resultado.</div>'; return; }
  el.innerHTML = fil.map(v => {
    const lvts = lerLocal('twm_lvt_' + v.f) || [];
    const ult = lvts.length ? lvts[0] : null;
    const sub = ult ? `Última: ${ult.data} · ${ult.liberado==='sim'?'✅ Liberado':'❌ Não liberado'}` : 'Nenhuma LVT registrada';
    return `<div class="vrow" onclick="abrirFrota('${v.f}')">
      <div><div class="vf">${v.f}</div><div class="vi">${v.tipo} · ${sub}</div></div>
      <span class="varr">›</span>
    </div>`;
  }).join('');
}

function abrirFrota(frota) {
  frotaAtual = frota;
  history.pushState({tela:'hist', frota}, '');
  document.getElementById('headerTitle').textContent = frota + ' — LVT';
  mostrarTela('hist');
  renderHist();
}

// ── HISTÓRICO ─────────────────────────────────────────────────
function renderHist() {
  const lvts = lerLocal('twm_lvt_' + frotaAtual) || [];
  const el = document.getElementById('listaHist');
  if (!lvts.length) { el.innerHTML = '<div class="empty">Nenhuma LVT registrada.</div>'; return; }
  el.innerHTML = lvts.map((l, i) => {
    const nao = Object.values(l.respostas||{}).filter(r => r === 'nao').length;
    return `<div class="hist-item" onclick="verLVT(${i})">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div class="hist-data">${l.data} · ${l.hora}</div>
        <span class="hist-status ${l.liberado==='sim'?'hist-ok':'hist-nok'}">${l.liberado==='sim'?'✅ LIBERADO':'❌ NÃO LIBERADO'}</span>
      </div>
      <div class="hist-info">Motorista: ${l.motorista||'—'} · ${nao} item(ns) NÃO</div>
    </div>`;
  }).join('');
}

// ── NOVO LVT ──────────────────────────────────────────────────
function novoChecklist() {
  respostas = {}; vencimentos = {}; liberado = null;
  history.pushState({tela:'form', frota: frotaAtual}, '');
  document.getElementById('headerTitle').textContent = 'Nova LVT';
  mostrarTela('form');
  construirForm();
  const agora = new Date();
  document.getElementById('f-data').value = agora.toISOString().split('T')[0];
  document.getElementById('f-hora').value = agora.toTimeString().slice(0,5);
  document.getElementById('f-vp').value = frotaAtual;
  document.getElementById('btn-lib-sim').className = 'btn-lib';
  document.getElementById('btn-lib-nao').className = 'btn-lib';
  ['f-motorista','f-un','f-agend','f-cliente','f-orp','f-nf','f-produto',
   'f-placa-cav','f-ano-cav','f-placa-car1','f-ano-car1','f-placa-car2','f-ano-car2',
   'f-cnh','f-cap1','f-cap2','f-obs','f-viagem1','f-viagem2','f-viagem3',
   'f-resp-transp','f-rg-transp','f-resp-vistoria','f-mat-vistoria'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
}

function construirForm() {
  SECOES.forEach(sec => {
    const el = document.getElementById('sec-' + sec.id);
    while (el.children.length > 1) el.removeChild(el.lastChild);
    sec.itens.forEach(item => {
      const div = document.createElement('div');
      div.className = 'item-row';
      div.innerHTML = `
        <span class="item-num">${item.n}</span>
        <div style="flex:1">
          <div class="item-desc">${item.desc}</div>
          ${item.venc ? `<input style="margin-top:4px;width:100%;padding:5px 8px;border:1px solid var(--border2);border-radius:6px;background:var(--bg);color:var(--text);font-size:11px;font-family:Barlow,sans-serif;outline:none" placeholder="Vencimento: DD/MM/AAAA" id="venc-${item.n}">` : ''}
        </div>
        <div class="item-btns">
          <button class="btn-opt" id="bs-${item.n}" onclick="marcar(${item.n},'sim')">S</button>
          <button class="btn-opt" id="bn-${item.n}" onclick="marcar(${item.n},'nao')">N</button>
        </div>`;
      el.appendChild(div);
    });
  });
}

function marcar(n, val) {
  respostas[n] = val;
  document.getElementById('bs-'+n).className = 'btn-opt' + (val==='sim'?' sim-sel':'');
  document.getElementById('bn-'+n).className = 'btn-opt' + (val==='nao'?' nao-sel':'');
}

function setLib(val) {
  liberado = val;
  document.getElementById('btn-lib-sim').className = 'btn-lib' + (val==='sim'?' lib-sim':'');
  document.getElementById('btn-lib-nao').className = 'btn-lib' + (val==='nao'?' lib-nao':'');
}

// ── SALVAR ────────────────────────────────────────────────────
function salvarLVT() {
  const data = document.getElementById('f-data').value;
  const motorista = document.getElementById('f-motorista').value.trim();
  if (!data) { showToast('⚠ Informe a data'); return; }
  if (!motorista) { showToast('⚠ Informe o motorista'); return; }
  if (!liberado) { showToast('⚠ Indique se o veículo foi liberado'); return; }

  const totalItens = SECOES.reduce((a,s)=>a+s.itens.length, 0);
  if (Object.keys(respostas).length < totalItens) {
    showToast(`⚠ ${totalItens - Object.keys(respostas).length} itens sem resposta`);
    return;
  }

  // Coleta vencimentos
  SECOES.forEach(sec => sec.itens.forEach(item => {
    if (item.venc) {
      const el = document.getElementById('venc-'+item.n);
      if (el && el.value) vencimentos[item.n] = el.value;
    }
  }));

  const lvt = {
    id: Date.now(), frota: frotaAtual,
    data: document.getElementById('f-data').value.split('-').reverse().join('/'),
    hora: document.getElementById('f-hora').value,
    motorista, produto: document.getElementById('f-produto').value,
    un: document.getElementById('f-un').value,
    agend: document.getElementById('f-agend').value,
    cliente: document.getElementById('f-cliente').value,
    placa_cav: document.getElementById('f-placa-cav').value,
    placa_car1: document.getElementById('f-placa-car1').value,
    placa_car2: document.getElementById('f-placa-car2').value,
    cnh: document.getElementById('f-cnh').value,
    obs: document.getElementById('f-obs').value,
    resp_transp: document.getElementById('f-resp-transp').value,
    resp_vistoria: document.getElementById('f-resp-vistoria').value,
    liberado, respostas: {...respostas}, vencimentos: {...vencimentos},
  };

  const lista = lerLocal('twm_lvt_' + frotaAtual) || [];
  lista.unshift(lvt);
  salvarLocal('twm_lvt_' + frotaAtual, lista);

  if (navigator.onLine) {
    const params = new URLSearchParams({
      action: 'salvarLVT',
      frota: lvt.frota, data: lvt.data, hora: lvt.hora,
      motorista: lvt.motorista, produto: lvt.produto,
      placa_cav: lvt.placa_cav, placa_car1: lvt.placa_car1,
      liberado: lvt.liberado, obs: lvt.obs,
      respostas: JSON.stringify(lvt.respostas),
    });
    fetch(SCRIPT_URL + '?' + params.toString()).catch(()=>{});
  }

  showToast('✅ LVT salva!');
  setTimeout(() => { history.back(); mostrarTela('hist'); renderHist(); }, 1000);
}

// ── VER LVT ───────────────────────────────────────────────────
function verLVT(idx) {
  const lista = lerLocal('twm_lvt_' + frotaAtual) || [];
  const lvt = lista[idx];
  if (!lvt) return;
  history.pushState({tela:'view'}, '');
  document.getElementById('headerTitle').textContent = lvt.data;
  mostrarTela('view');
  const icons = {sim:'✅', nao:'❌'};
  let html = `<div style="background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:12px">
    <div style="font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;color:var(--text)">${lvt.frota}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:12px;color:var(--muted);margin-top:8px">
      <div>📅 ${lvt.data}</div><div>🕐 ${lvt.hora}</div>
      <div>👤 ${lvt.motorista}</div><div>⛽ ${lvt.produto||'—'}</div>
      <div>🚛 ${lvt.placa_cav||'—'}</div><div>🏭 ${lvt.un||'—'}</div>
    </div>
    <div style="margin-top:10px;padding:8px 14px;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;text-align:center;${lvt.liberado==='sim'?'background:rgba(16,185,129,.15);color:var(--green)':'background:rgba(239,68,68,.15);color:var(--red)'}">
      ${lvt.liberado==='sim'?'✅ VEÍCULO LIBERADO':'❌ VEÍCULO NÃO LIBERADO'}
    </div>
  </div>`;
  SECOES.forEach(sec => {
    html += `<div class="section" style="margin-bottom:12px"><div class="section-header" style="background:#4C1D95">${sec.itens[0] ? sec.id.toUpperCase() : ''}</div>`;
    sec.itens.forEach(item => {
      const r = lvt.respostas[item.n]||'';
      const cor = r==='sim'?'var(--green)':r==='nao'?'var(--red)':'var(--muted)';
      const venc = lvt.vencimentos && lvt.vencimentos[item.n] ? ` <span style="color:var(--gold);font-size:10px">Venc: ${lvt.vencimentos[item.n]}</span>` : '';
      html += `<div class="item-row">
        <span class="item-num">${item.n}</span>
        <span class="item-desc">${item.desc}${venc}</span>
        <span style="color:${cor};font-weight:700;font-size:14px;min-width:24px;text-align:center">${icons[r]||'—'}</span>
      </div>`;
    });
    html += `</div>`;
  });
  if (lvt.obs) html += `<div class="obs-wrap"><label>Observações</label><div style="font-size:13px">${lvt.obs}</div></div>`;
  document.getElementById('viewContent').innerHTML = html;
}

// ── NAVEGAÇÃO ─────────────────────────────────────────────────
function mostrarTela(t) {
  telaAtual = t;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-'+t).classList.add('active');
}

function voltar() {
  if (telaAtual === 'lista') { window.location.href = 'index.html'; return; }
  history.back();
}

window.addEventListener('popstate', function(e) {
  const state = e.state || {};
  if (state.tela === 'view')  { mostrarTela('hist'); document.getElementById('headerTitle').textContent = frotaAtual + ' — LVT'; return; }
  if (state.tela === 'form')  { mostrarTela('hist'); document.getElementById('headerTitle').textContent = frotaAtual + ' — LVT'; return; }
  if (state.tela === 'hist')  { mostrarTela('lista'); document.getElementById('headerTitle').textContent = 'LVT — Check-List Diário'; return; }
  mostrarTela('lista');
  document.getElementById('headerTitle').textContent = 'LVT — Check-List Diário';
});

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

history.replaceState({tela:'lista'}, '');
carregarFrotas();
</script>
